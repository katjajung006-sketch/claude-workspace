<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Der Funktionsmodus-Check – Jetzt kostenlos sichern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sand:       #D8C7B2;
    --cream:      #F4EFE7;
    --clay:       #9A7461;
    --espresso:   #3A2D28;
    --copper:     #B66F55;
    --mauve:      #A9878A;
    --bg-soft:    #44342E;
    --text-muted: #C9BFB4;
    --line:       rgba(244,239,231,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--espresso);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(182,111,85,0.10), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(169,135,138,0.10), transparent 50%);
  }

  h1, h2, h3 {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    line-height: 1.15;
  }

  em {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--mauve);
  }

  .card {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 56px 48px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 40px 100px rgba(0,0,0,0.4);
    text-align: center;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(244,239,231,0.04);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 28px;
  }
  .pill::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--copper);
    flex-shrink: 0;
  }

  .card h1 {
    font-size: clamp(28px, 5vw, 40px);
    margin-bottom: 16px;
    color: var(--cream);
  }

  .card p.lead {
    font-size: 16px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 0 0 32px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
  }

  label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  input[type="text"],
  input[type="email"] {
    width: 100%;
    padding: 16px 20px;
    background: rgba(244,239,231,0.05);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color .2s ease;
  }

  input[type="text"]::placeholder,
  input[type="email"]::placeholder {
    color: rgba(244,239,231,0.25);
  }

  input[type="text"]:focus,
  input[type="email"]:focus {
    border-color: var(--copper);
  }

  .btn {
    margin-top: 8px;
    padding: 18px 38px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--copper), #C98D72);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 60px rgba(182,111,85,0.35);
    transition: transform .25s ease, box-shadow .25s ease;
    width: 100%;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 80px rgba(182,111,85,0.55);
  }

  .trust {
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .back-link {
    margin-top: 32px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color .2s;
  }
  .back-link:hover { color: var(--cream); }

  @media (max-width: 540px) {
    .card { padding: 36px 24px; }
  }
</style>
</head>
<body>

  <div class="card">
    <span class="pill">Kostenloses Freebie · Selbstcheck</span>

    <h1>Hol dir den <em>Funktionsmodus-Check</em></h1>
    <p class="lead">
      Trage dich ein und bekomme deinen Selbstcheck sofort per E-Mail —
      kostenlos, ohne Druck, direkt in deinen Alltag.
    </p>

    <hr class="divider">

    <!-- Ersetze SYSTEME_IO_ACTION_URL mit der URL aus systeme.io -->
    <form action="SYSTEME_IO_ACTION_URL" method="POST">

      <div class="field">
        <label for="vorname">Vorname</label>
        <input type="text" id="vorname" name="first_name" placeholder="Dein Vorname" required />
      </div>

      <div class="field">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" placeholder="deine@email.de" required />
      </div>

      <button type="submit" class="btn">Jetzt kostenlos sichern</button>

    </form>

    <p class="trust">
      · 100 % kostenlos · Kein Spam · Jederzeit abmeldbar
    </p>
  </div>

  <a href="/" class="back-link">← Zurück zur Übersicht</a>

</body>
</html>
